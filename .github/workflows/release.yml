name: Release

on:
  push:
    branches: ["release/*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (ex: v1.2.3)"
        required: true

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Type check
        run: pnpm lint && pnpm type-check

      - name: Build
        run: pnpm build

      - name: Extract and validate version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            # release/1.2.3 → 1.2.3
            BRANCH="${{ github.ref_name }}"
            RAW="${BRANCH#release/}"
          fi
          # Normalize: strip leading 'v' then re-add it
          VERSION="v${RAW#v}"
          # Enforce strict semver vX.Y.Z
          if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version '$VERSION'. Branch must follow release/X.Y.Z format."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version resolved: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Release ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open PR release → main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh pr create \
            --base main \
            --head "${{ github.ref_name }}" \
            --title "release: ${{ steps.version.outputs.version }}" \
            --body "$(cat <<'EOF'
          ## Release ${{ steps.version.outputs.version }}

          This PR was automatically created by the release workflow.

          - Tag `${{ steps.version.outputs.version }}` has been created ✅
          - GitHub Release has been published ✅
          - Merge this PR into `main` to complete the release

          After merging, sync `develop`:
          ```bash
          git checkout develop && git merge origin/main && git push origin develop
          ```
          EOF
          )" \
            --label "release" || echo "PR already exists"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
