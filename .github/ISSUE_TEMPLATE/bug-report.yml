name: "Bug Report"
description: "Signaler un bug dans Grimoire"
title: "[BUG] "
labels: ["type: bug", "status: needs-info"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire avec précision. Plus il est complet, plus le fix sera rapide.

  - type: textarea
    id: description
    attributes:
      label: "Description du bug"
      description: "Que se passe-t-il ? Quel était le comportement attendu ?"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "Étapes pour reproduire"
      placeholder: |
        1. Aller sur la page ...
        2. Cliquer sur ...
        3. Observer l'erreur ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Comportement attendu"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs / Stack trace"
      description: "Coller ici les erreurs de la console navigateur ou du terminal"
      render: shell

  - type: dropdown
    id: domain
    attributes:
      label: "Domaine affecté"
      options:
        - "frontend"
        - "backend"
        - "shared"
        - "ai"
        - "database"
        - "devops"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Sévérité"
      options:
        - "critical — bloque totalement le jeu"
        - "major — fonctionnalité importante cassée"
        - "minor — cosmétique ou cas rare"
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: "Reproductibilité"
      options:
        - "Toujours (100%)"
        - "Souvent (>50%)"
        - "Parfois (<50%)"
        - "Rare (une seule fois)"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environnement"
      placeholder: |
        - OS: macOS 15 / Windows 11 / Ubuntu 22
        - Navigateur: Chrome 121 / Firefox 123
        - Node: 20.x
        - URL concernée: /game/session/xxx
