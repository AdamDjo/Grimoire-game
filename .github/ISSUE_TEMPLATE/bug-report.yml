name: "Bug Report"
description: "Signaler un bug"
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: "Que se passe-t-il ?"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur ...
        2. Cliquer sur ...
        3. Observer ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Domaine
      options:
        - "frontend"
        - "backend"
        - "shared"
        - "ai"
        - "database"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Sévérité
      options:
        - "critical - bloque le jeu"
        - "major - fonctionnalité cassée"
        - "minor - cosmétique ou mineur"
    validations:
      required: true
