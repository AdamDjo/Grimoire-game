name: "Chore / Tooling"
description: "Maintenance, refacto, mise à jour de dépendances, CI/CD"
title: "[CHORE] "
labels: ["type: chore", "domain: devops"]
body:
  - type: dropdown
    id: type
    attributes:
      label: "Type de chore"
      options:
        - "Refactoring (pas de changement de comportement)"
        - "Mise à jour de dépendance"
        - "Configuration CI/CD"
        - "Amélioration de tooling"
        - "Nettoyage de code"
        - "Mise à jour documentation"
        - "Rename / restructuration"
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: "Domaine"
      options:
        - "devops"
        - "frontend"
        - "backend"
        - "shared"

  - type: dropdown
    id: size
    attributes:
      label: "Taille estimée"
      options:
        - "XS — ~1h (1pt)"
        - "S — ~2h (2pt)"
        - "M — ~4h (3pt)"
        - "L — ~1 jour (5pt)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Qu'est-ce qui doit être fait et pourquoi ?"
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: "Impact attendu"
      description: "Qu'est-ce que ça améliore concrètement ?"

  - type: checkboxes
    id: safety
    attributes:
      label: "Vérifications"
      options:
        - label: "Pas de changement de comportement fonctionnel"
        - label: "Les tests passent après le changement"
        - label: "CI/CD non cassé"
